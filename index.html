<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 400px;
            max-height: 800px;
            background: #000;
            margin: auto;
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: bold;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: none;
        }

        #storyButton {
            font-size: clamp(16px, 4vw, 20px);
            padding: 12px 35px;
            background: #444;
            color: #fff;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #storyButton:hover, #storyButton:active {
            background: #555;
            border-color: #888;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controlPanel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            padding: 18px;
            border-radius: 15px;
            gap: 5px;
            z-index: 20;
            background: transparent;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: transparent;
            color: #fff;
            border: 3px solid #4a7c4a;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            touch-action: manipulation;
            user-select: none;
        }

        .control-btn:active {
            background: rgba(74, 124, 74, 0.3);
            transform: scale(0.95);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 5px;
            width: 160px;
            height: 160px;
            justify-content: center;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { 
            grid-area: center; 
            background: transparent;
            border: 3px solid #666;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        let gameState = 'home';
        let player = { x: 1000, y: 1000, size: 40, speed: 0.8 }; // アルパカサイズ通常に戻す
        let camera = { x: 0, y: 0 };
        let worldSize = 2000;
        let moveIntervals = {};
        let lastTime = 0;
        
        // 都市マップ生成
        const buildings = [];
        const tileSize = 100;

        function generateCity() {
            buildings.length = 0;
            const buildingEmojis = ['🏢', '🏗️']; // 🏙️完全削除
            
            for (let x = 0; x < worldSize; x += tileSize) {
                for (let y = 0; y < worldSize; y += tileSize) {
                    if (Math.random() < 0.4) {
                        buildings.push({
                            x: x + tileSize/2,
                            y: y + tileSize/2,
                            emoji: buildingEmojis[Math.floor(Math.random() * 2)],
                            size: tileSize
                        });
                    }
                }
            }
        }

        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.getElementById('storyButton').addEventListener('click', startStory);

        function startStory() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            player.x = worldSize / 2;
            player.y = worldSize / 2;
            
            generateCity();
            updateCamera();
            gameLoop();
        }

        function setupLongPress(btnId, dx, dy) {
            const btn = document.getElementById(btnId);
            const startMove = () => { moveIntervals[btnId] = true; };
            const stopMove = () => { moveIntervals[btnId] = false; };

            btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(); }, { passive: false });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); stopMove(); }, { passive: false });
            btn.addEventListener('touchcancel', stopMove);
            btn.addEventListener('mousedown', startMove);
            document.addEventListener('mouseup', stopMove);
        }

        setupLongPress('upBtn', 0, -1);
        setupLongPress('downBtn', 0, 1);
        setupLongPress('leftBtn', -1, 0);
        setupLongPress('rightBtn', 1, 0);

        document.addEventListener('keydown', (e) => {
            if (gameState !== 'story') return;
            const keyActions = {
                'ArrowUp': [0, -1], 'ArrowDown': [0, 1],
                'ArrowLeft': [-1, 0], 'ArrowRight': [1, 0]
            };
            if (keyActions[e.key]) movePlayer(...keyActions[e.key]);
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            player.x = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.y));
        }

        function updateCamera() {
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(worldSize - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(worldSize - canvas.height, camera.y));
        }

        function gameLoop(currentTime) {
            if (gameState !== 'story') return;

            if (lastTime) {
                const deltaTime = (currentTime - lastTime) / 16.67;
                const moveSpeed = player.speed * deltaTime;
                
                if (moveIntervals['upBtn']) movePlayer(0, -moveSpeed);
                if (moveIntervals['downBtn']) movePlayer(0, moveSpeed);
                if (moveIntervals['leftBtn']) movePlayer(-moveSpeed, 0);
                if (moveIntervals['rightBtn']) movePlayer(moveSpeed, 0);
                
                updateCamera();
            }
            lastTime = currentTime;

            // 夜の都市背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(1, '#1a1a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 道路グリッド
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            const roadSize = 100;
            const startX = Math.floor(camera.x / roadSize) * roadSize;
            const startY = Math.floor(camera.y / roadSize) * roadSize;
            
            for (let x = startX; x < camera.x + canvas.width + roadSize; x += roadSize) {
                ctx.beginPath();
                ctx.moveTo(x - camera.x, 0);
                ctx.lineTo(x - camera.x, canvas.height);
                ctx.stroke();
            }
            for (let y = startY; y < camera.y + canvas.height + roadSize; y += roadSize) {
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }

            // 大きな建物描画
            ctx.font = '80px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            
            buildings.forEach(building => {
                const screenX = building.x - camera.x;
                const screenY = building.y - camera.y;
                if (screenX > -100 && screenX < canvas.width + 100 &&
                    screenY > -100 && screenY < canvas.height + 100) {
                    ctx.fillText(building.emoji, screenX, screenY);
                }
            });

            // 🦙（現実的なサイズ）
            ctx.font = '40px Arial';
            ctx.fillStyle = '#fff';
            ctx.fillText('🦙', player.x - camera.x, player.y - camera.y);

            requestAnimationFrame(gameLoop);
        }

        canvas.focus();
    </script>
</body>
</html>
