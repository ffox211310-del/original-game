<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #87CEEB, #98FB98);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 3px solid #333;
            background: #000;
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #87CEEB, #98FB98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: 48px;
            font-weight: bold;
            color: #2c5f2d;
            margin-bottom: 50px;
            text-shadow: 3px 3px 0px #fff;
        }

        #storyButton {
            font-size: 24px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        #storyButton:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }

        #gameCanvas {
            display: block;
            background: #90EE90; /* 草原色 */
        }

        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .control-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 10px;
            width: 200px;
            height: 200px;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { grid-area: center; background: #666; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let gameState = 'home'; // 'home' or 'story'
        let player = { x: 400, y: 300, size: 40, speed: 3 };

        // DOM要素
        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ストーリーモード開始
        document.getElementById('storyButton').addEventListener('click', startStory);

        function startStory() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            
            // 草原中央にスポーン
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            
            gameLoop();
        }

        // コントロールイベント
        document.getElementById('upBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(0, -1); });
        document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(0, 1); });
        document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(-1, 0); });
        document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); movePlayer(1, 0); });

        // PC用キー入力も追加
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'story') return;
            switch(e.key) {
                case 'ArrowUp': movePlayer(0, -1); break;
                case 'ArrowDown': movePlayer(0, 1); break;
                case 'ArrowLeft': movePlayer(-1, 0); break;
                case 'ArrowRight': movePlayer(1, 0); break;
            }
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            // 画面端で止める
            player.x = Math.max(player.size/2, Math.min(canvas.width - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(canvas.height - player.size/2, player.y));
        }

        function gameLoop() {
            if (gameState !== 'story') return;

            // クリア画面
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ランヤード🦙描画
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🦙', player.x, player.y);

            requestAnimationFrame(gameLoop);
        }

        // 初期化
        canvas.focus();
    </script>
</body>
</html>
