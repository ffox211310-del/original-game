<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(45deg, #87CEEB, #98FB98);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            border: 3px solid #333;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #storyButton {
            font-size: 22px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        #storyButton:hover, #storyButton:active {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 20px;
            gap: 8px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            font-size: 22px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s;
            touch-action: manipulation;
            user-select: none;
        }

        .control-btn:active {
            transform: scale(0.9);
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 8px;
            width: 180px;
            height: 180px;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { grid-area: center; background: #666; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas" width="360" height="640"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let gameState = 'home';
        let player = { x: 1000, y: 1000, size: 40, speed: 4 };
        let camera = { x: 0, y: 0 };
        let worldSize = 2000;
        let moveIntervals = {};

        // DOM要素
        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ストーリーモード開始
        document.getElementById('storyButton').addEventListener('click', startStory);

        function startStory() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            
            player.x = worldSize / 2;
            player.y = worldSize / 2;
            updateCamera();
            gameLoop();
        }

        // 長押し移動システム
        function setupLongPress(btnId, dx, dy) {
            const btn = document.getElementById(btnId);
            
            const startMove = () => {
                movePlayer(dx, dy);
                moveIntervals[btnId] = setInterval(() => movePlayer(dx, dy), 80);
            };
            
            const stopMove = () => {
                if (moveIntervals[btnId]) {
                    clearInterval(moveIntervals[btnId]);
                    delete moveIntervals[btnId];
                }
            };

            // タッチ
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startMove();
            }, { passive: false });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopMove();
            }, { passive: false });
            
            btn.addEventListener('touchcancel', stopMove);

            // マウス
            btn.addEventListener('mousedown', startMove);
            document.addEventListener('mouseup', stopMove);
        }

        // 各ボタンに長押し設定
        setupLongPress('upBtn', 0, -1);
        setupLongPress('downBtn', 0, 1);
        setupLongPress('leftBtn', -1, 0);
        setupLongPress('rightBtn', 1, 0);

        // PCキー
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'story') return;
            const keyActions = {
                'ArrowUp': [0, -1],
                'ArrowDown': [0, 1],
                'ArrowLeft': [-1, 0],
                'ArrowRight': [1, 0]
            };
            if (keyActions[e.key]) {
                movePlayer(...keyActions[e.key]);
            }
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            player.x = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.y));
            
            updateCamera();
        }

        function updateCamera() {
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(worldSize - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(worldSize - canvas.height, camera.y));
        }

        function gameLoop() {
            if (gameState !== 'story') return;

            // 緑と黄緑の縞々草原
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(-camera.x % 80, -camera.y % 80); // 縞々パターン
            
            // 縞々地面（緑と黄緑）
            for (let x = 0; x < worldSize; x += 80) {
                for (let y = 0; y < worldSize; y += 80) {
                    ctx.fillStyle = (Math.floor(x/80) + Math.floor(y/80)) % 2 === 0 ? '#32CD32' : '#90EE90';
                    ctx.fillRect(x, y, 80, 80);
                }
            }
            ctx.restore();

            // 🦙（画面中央）
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🦙', player.x - camera.x, player.y - camera.y);

            // 座標表示
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`X:${Math.round(player.x)} Y:${Math.round(player.y)}`, 10, 25);

            requestAnimationFrame(gameLoop);
        }

        canvas.focus();
    </script>
</body>
</html>
