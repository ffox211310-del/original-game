<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #87CEEB, #98FB98);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 360px;  /* スマホ縦長に最適化 */
            height: 640px; /* 縦長比率 */
            border: 3px solid #333;
            background: #000;
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #87CEEB, #98FB98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: 36px;  /* 縦長なので少し小さく */
            font-weight: bold;
            color: #2c5f2d;
            margin-bottom: 40px;
            text-shadow: 3px 3px 0px #fff;
        }

        #storyButton {
            font-size: 20px;
            padding: 12px 35px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        #storyButton:hover, #storyButton:active {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }

        #gameCanvas {
            display: block;
            background: #90EE90; /* 草原色 */
        }

        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            gap: 8px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            font-size: 22px;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .control-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 8px;
            width: 180px;
            height: 180px;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { grid-area: center; background: #666; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas" width="360" height="640"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        // ゲーム状態
        let gameState = 'home'; // 'home' or 'story'
        let player = { x: 180, y: 320, size: 40, speed: 4 }; // ワールド座標
        let camera = { x: 0, y: 0 }; // カメラ位置
        let worldSize = 2000; // オープンワールドの広さ

        // DOM要素
        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ストーリーモード開始
        document.getElementById('storyButton').addEventListener('click', startStory);

        function startStory() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            
            // 草原中央にスポーン
            player.x = worldSize / 2;
            player.y = worldSize / 2;
            updateCamera();
            
            gameLoop();
        }

        // コントロールイベント（タッチ長押し対応）
        function addControlEvent(btnId, dx, dy) {
            const btn = document.getElementById(btnId);
            let pressTimer;
            
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                movePlayer(dx, dy);
                pressTimer = setInterval(() => movePlayer(dx, dy), 100);
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                clearInterval(pressTimer);
            });
            
            btn.addEventListener('mousedown', () => {
                movePlayer(dx, dy);
                pressTimer = setInterval(() => movePlayer(dx, dy), 100);
            });
            
            btn.addEventListener('mouseup', () => clearInterval(pressTimer));
        }

        addControlEvent('upBtn', 0, -1);
        addControlEvent('downBtn', 0, 1);
        addControlEvent('leftBtn', -1, 0);
        addControlEvent('rightBtn', 1, 0);

        // PC用キー入力
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'story') return;
            switch(e.key) {
                case 'ArrowUp': movePlayer(0, -1); break;
                case 'ArrowDown': movePlayer(0, 1); break;
                case 'ArrowLeft': movePlayer(-1, 0); break;
                case 'ArrowRight': movePlayer(1, 0); break;
            }
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            // ワールド境界チェック
            player.x = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.y));
            
            updateCamera();
        }

        function updateCamera() {
            // 🦙を画面中央に固定
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            
            // カメラの境界制限
            camera.x = Math.max(0, Math.min(worldSize - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(worldSize - canvas.height, camera.y));
        }

        function gameLoop() {
            if (gameState !== 'story') return;

            // 草原背景（カメラに追従）
            ctx.fillStyle = '#90EE90';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 雲っぽい装飾（ワールド座標で動く）
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            for(let i = 0; i < 5; i++) {
                const wx = (camera.x + i * 400) % worldSize;
                const wy = (camera.y + i * 200) % worldSize;
                ctx.beginPath();
                ctx.arc(wx - camera.x, wy - camera.y, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            // 🦙描画（画面中央固定）
            ctx.save();
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🦙', player.x - camera.x, player.y - camera.y);
            ctx.restore();

            // デバッグ：座標表示
            ctx.fillStyle = 'white';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`X: ${Math.round(player.x)} Y: ${Math.round(player.y)}`, 10, 30);

            requestAnimationFrame(gameLoop);
        }

        // 初期化
        canvas.focus();
    </script>
</body>
</html>
