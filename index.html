<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 360px;
            height: 640px;
            background: #000;
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: none;
        }

        #storyButton {
            font-size: 20px;
            padding: 12px 35px;
            background: #444;
            color: #fff;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #storyButton:hover, #storyButton:active {
            background: #555;
            border-color: #888;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controlPanel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            background: rgba(0,0,0,0.9);
            padding: 18px;
            border-radius: 15px;
            gap: 5px;
            z-index: 20;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: #2d5a2d;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            touch-action: manipulation;
            user-select: none;
        }

        .control-btn:active {
            background: #3a6a3a;
            transform: scale(0.95);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 5px;
            width: 160px;
            height: 160px;
            justify-content: center;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { grid-area: center; background: #444; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas" width="360" height="640"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        let gameState = 'home';
        let player = { x: 1000, y: 1000, size: 40, speed: 0.8 }; // 速度を小さく
        let camera = { x: 0, y: 0 };
        let worldSize = 2000;
        let moveIntervals = {};
        let lastTime = 0;

        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('storyButton').addEventListener('click', startStory);

        function startStory() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            player.x = worldSize / 2;
            player.y = worldSize / 2;
            updateCamera();
            gameLoop();
        }

        // 滑らかな長押し移動
        function setupLongPress(btnId, dx, dy) {
            const btn = document.getElementById(btnId);
            
            const startMove = () => {
                moveIntervals[btnId] = true;
            };
            
            const stopMove = () => {
                moveIntervals[btnId] = false;
            };

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startMove();
            }, { passive: false });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopMove();
            }, { passive: false });
            
            btn.addEventListener('touchcancel', stopMove);

            btn.addEventListener('mousedown', startMove);
            document.addEventListener('mouseup', stopMove);
        }

        setupLongPress('upBtn', 0, -1);
        setupLongPress('downBtn', 0, 1);
        setupLongPress('leftBtn', -1, 0);
        setupLongPress('rightBtn', 1, 0);

        // PCキー
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'story') return;
            const keyActions = {
                'ArrowUp': [0, -1],
                'ArrowDown': [0, 1],
                'ArrowLeft': [-1, 0],
                'ArrowRight': [1, 0]
            };
            if (keyActions[e.key]) {
                movePlayer(...keyActions[e.key]);
            }
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            player.x = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.y));
        }

        function updateCamera() {
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(worldSize - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(worldSize - canvas.height, camera.y));
        }

        function gameLoop(currentTime) {
            if (gameState !== 'story') return;

            // デルタタイムで滑らかに
            if (lastTime) {
                const deltaTime = (currentTime - lastTime) / 16.67; // 60fps基準
                const moveSpeed = player.speed * deltaTime;
                
                // 長押し移動（毎フレーム処理）
                if (moveIntervals['upBtn']) movePlayer(0, -moveSpeed);
                if (moveIntervals['downBtn']) movePlayer(0, moveSpeed);
                if (moveIntervals['leftBtn']) movePlayer(-moveSpeed, 0);
                if (moveIntervals['rightBtn']) movePlayer(moveSpeed, 0);
                
                updateCamera();
            }
            lastTime = currentTime;

            // 背景クリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 緑黄緑チェック柄（カメラ追従）
            const tileSize = 40;
            const startX = Math.floor(camera.x / tileSize) * tileSize;
            const startY = Math.floor(camera.y / tileSize) * tileSize;
            
            for (let x = startX; x < camera.x + canvas.width + tileSize; x += tileSize) {
                for (let y = startY; y < camera.y + canvas.height + tileSize; y += tileSize) {
                    ctx.fillStyle = ((Math.floor(x/tileSize) + Math.floor(y/tileSize)) % 2 === 0) ? '#2d5a2d' : '#4a7c4a';
                    ctx.fillRect(x - camera.x, y - camera.y, tileSize, tileSize);
                }
            }

            // 🦙（画面中央）
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🦙', player.x - camera.x, player.y - camera.y);

            // 座標
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`X:${Math.round(player.x)} Y:${Math.round(player.y)}`, 10, 25);

            requestAnimationFrame(gameLoop);
        }

        canvas.focus();
    </script>
</body>
</html>
