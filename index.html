<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルゲーム</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 400px;
            max-height: 800px;
            background: #000;
            margin: auto;
        }

        #homeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #gameTitle {
            font-size: clamp(32px, 8vw, 48px);
            font-weight: bold;
            color: #fff;
            margin-bottom: 60px;
            text-shadow: none;
        }

        #storyButton {
            font-size: clamp(16px, 4vw, 20px);
            padding: 12px 35px;
            background: #444;
            color: #fff;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #storyButton:hover, #storyButton:active {
            background: #555;
            border-color: #888;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controlPanel {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            padding: 18px;
            border-radius: 15px;
            gap: 5px;
            z-index: 20;
            background: transparent;
            pointer-events: none;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            font-size: 20px;
            background: transparent;
            color: #fff;
            border: 3px solid #4a7c4a;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            touch-action: manipulation;
            user-select: none;
            pointer-events: auto;
        }

        .control-btn:active {
            background: rgba(74, 124, 74, 0.3);
            transform: scale(0.95);
        }

        .dpad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left center right"
                ". down .";
            gap: 5px;
            width: 160px;
            height: 160px;
            justify-content: center;
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }
        .center { 
            grid-area: center; 
            background: transparent;
            border: 3px solid #666;
            color: #666;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ホーム画面 -->
        <div id="homeScreen">
            <div id="gameTitle">オリジナルゲーム</div>
            <button id="storyButton">ストーリーモード</button>
        </div>

        <!-- ゲーム画面 -->
        <canvas id="gameCanvas"></canvas>

        <!-- コントロールパネル -->
        <div id="controlPanel" class="dpad">
            <button class="control-btn up" id="upBtn">↑</button>
            <button class="control-btn left" id="leftBtn">←</button>
            <button class="control-btn center">●</button>
            <button class="control-btn right" id="rightBtn">→</button>
            <button class="control-btn down" id="downBtn">↓</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const homeScreen = document.getElementById('homeScreen');
        const controlPanel = document.getElementById('controlPanel');
        const storyButton = document.getElementById('storyButton');

        let gameState = 'home';
        let player = { x: 1000, y: 1000, size: 40, speed: 2 };
        let camera = { x: 0, y: 0 };
        let worldSize = 2000;
        const moveFlags = { up: false, down: false, left: false, right: false };
        let lastTime = 0;
        let gameLoopId = null;
        const buildings = [];
        const tileSize = 100;
        
        // ボス関連
        let boss = null;
        let showBossScene = false;
        let bossDialogueStep = 0;
        const bossDialogue = [
            "おい、新入りか？",
            "初任務だ。例の荷物を...",
            "東の倉庫まで運んでこい",
            "わかったら動け！"
        ];

        // 多彩な建物絵文字リスト
        const buildingEmojis = ['🏢', '🏗️', '🏪', '🏦', '🗼', '🏬', '🏭', '🏣', '🏫', '🏥', '⛪️'];

        function generateCity() {
            buildings.length = 0;
            
            for (let x = 0; x < worldSize; x += tileSize) {
                for (let y = 0; y < worldSize; y += tileSize) {
                    if (Math.random() < 0.35) {
                        buildings.push({
                            worldX: x + tileSize/2,
                            worldY: y + tileSize/2,
                            emoji: buildingEmojis[Math.floor(Math.random() * buildingEmojis.length)]
                        });
                    }
                }
            }
            
            // ボスを固定位置に配置（南東エリア）
            boss = {
                worldX: 1600,
                worldY: 1400,
                emoji: '👤',
                size: 50
            };
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ストーリーモード開始
        storyButton.addEventListener('click', function() {
            gameState = 'story';
            homeScreen.style.display = 'none';
            controlPanel.style.display = 'grid';
            player.x = worldSize / 2;
            player.y = worldSize / 2;
            generateCity();
            updateCamera();
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoop();
        });

        // コントロール設定
        function setupControls() {
            ['upBtn', 'downBtn', 'leftBtn', 'rightBtn'].forEach((btnId) => {
                const btn = document.getElementById(btnId);
                
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const dir = btnId.replace('Btn', '');
                    moveFlags[dir] = true;
                });
                
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    const dir = btnId.replace('Btn', '');
                    moveFlags[dir] = false;
                });
                
                btn.addEventListener('mousedown', () => {
                    const dir = btnId.replace('Btn', '');
                    moveFlags[dir] = true;
                });
            });
            
            document.addEventListener('mouseup', () => {
                moveFlags.up = moveFlags.down = moveFlags.left = moveFlags.right = false;
            });
        }

        setupControls();

        // スマホタッチ用ボス会話進行
canvas.addEventListener('touchstart', (e) => {
    if (gameState !== 'story' || !showBossScene) return;
    e.preventDefault();
    bossDialogueStep++;
    if (bossDialogueStep >= bossDialogue.length) {
        showBossScene = false;
        controlPanel.style.display = 'grid';
    }
}, { passive: false });

            
            const keyActions = {
                'ArrowUp': () => moveFlags.up = true,
                'ArrowDown': () => moveFlags.down = true,
                'ArrowLeft': () => moveFlags.left = true,
                'ArrowRight': () => moveFlags.right = true
            };
            if (keyActions[e.key]) keyActions[e.key]();
        });

        document.addEventListener('keyup', (e) => {
            const keyActions = {
                'ArrowUp': () => moveFlags.up = false,
                'ArrowDown': () => moveFlags.down = false,
                'ArrowLeft': () => moveFlags.left = false,
                'ArrowRight': () => moveFlags.right = false
            };
            if (keyActions[e.key]) keyActions[e.key]();
        });

        function movePlayer(dx, dy) {
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            
            player.x = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.x));
            player.y = Math.max(player.size/2, Math.min(worldSize - player.size/2, player.y));
        }

        function updateCamera() {
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(worldSize - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(worldSize - canvas.height, camera.y));
        }

        function checkBossEncounter() {
            const distance = Math.sqrt(
                Math.pow(player.x - boss.worldX, 2) + 
                Math.pow(player.y - boss.worldY, 2)
            );
            return distance < 120;
        }

        function gameLoop(currentTime) {
            if (gameState !== 'story') return;

            if (lastTime) {
                const deltaTime = Math.min((currentTime - lastTime) / 16.67, 3);
                const moveSpeed = player.speed * deltaTime;

                if (!showBossScene) {
                    if (moveFlags.up) movePlayer(0, -moveSpeed);
                    if (moveFlags.down) movePlayer(0, moveSpeed);
                    if (moveFlags.left) movePlayer(-moveSpeed, 0);
                    if (moveFlags.right) movePlayer(moveSpeed, 0);
                }
                
                updateCamera();
                
                // ボス接近チェック
                if (!showBossScene && checkBossEncounter()) {
                    showBossScene = true;
                    bossDialogueStep = 0;
                    controlPanel.style.display = 'none';
                }
            }
            lastTime = currentTime;

            // 夜の都市背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(1, '#1a1a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 道路グリッド
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            const roadSize = 100;
            const startX = Math.floor(camera.x / roadSize) * roadSize;
            const startY = Math.floor(camera.y / roadSize) * roadSize;
            
            for (let x = startX; x < camera.x + canvas.width + roadSize; x += roadSize) {
                ctx.beginPath();
                ctx.moveTo(x - camera.x, 0);
                ctx.lineTo(x - camera.x, canvas.height);
                ctx.stroke();
            }
            for (let y = startY; y < camera.y + canvas.height + roadSize; y += roadSize) {
                ctx.beginPath();
                ctx.moveTo(0, y - camera.y);
                ctx.lineTo(canvas.width, y - camera.y);
                ctx.stroke();
            }

            // 建物描画
            ctx.font = '80px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            
            buildings.forEach(building => {
                const screenX = building.worldX - camera.x;
                const screenY = building.worldY - camera.y;
                if (screenX > -100 && screenX < canvas.width + 100 &&
                    screenY > -100 && screenY < canvas.height + 100) {
                    ctx.fillText(building.emoji, screenX, screenY);
                }
            });

            // ボス描画
            if (boss) {
                const bossScreenX = boss.worldX - camera.x;
                const bossScreenY = boss.worldY - camera.y;
                ctx.font = '60px Arial';
                ctx.fillText(boss.emoji, bossScreenX, bossScreenY);
            }

            // 🦙
            ctx.font = '40px Arial';
            ctx.fillText('🦙', player.x - camera.x, player.y - camera.y);

            // ボス会話シーン
            if (showBossScene) {
                // 半透明オーバーレイ
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 会話ボックス
                ctx.fillStyle = '#222';
                ctx.fillRect(20, canvas.height - 140, canvas.width - 40, 100);
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, canvas.height - 140, canvas.width - 40, 100);
                
                // 会話テキスト
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText('👤 ボス: ' + bossDialogue[bossDialogueStep], 35, canvas.height - 90);
                
                // 次の指示
                if (bossDialogueStep < bossDialogue.length - 1) {
                    ctx.fillText('タッチで進める', 35, canvas.height - 55);
                } else {
                    ctx.fillText('タッチで任務開始', 35, canvas.height - 55);
                }
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        canvas.focus();
    </script>
</body>
